# ruff.toml
line-length = 100
target-version = "py311"

[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort (bach y-gadd l-imports automatique)
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
]
ignore = []

[format]
quote-style = "double"
indent-style = "space"
